<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Teep Saúde</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --purple: #7C3AED;
  --purple-light: #A78BFA;
  --purple-soft: #EDE9FE;
  --purple-dark: #5B21B6;
  --blue: #3B82F6;
  --blue-soft: #DBEAFE;
  --green: #10B981;
  --green-soft: #D1FAE5;
  --red: #EF4444;
  --red-soft: #FEE2E2;
  --orange: #F59E0B;
  --orange-soft: #FEF3C7;
  --bg: #F8F7FF;
  --surface: #FFFFFF;
  --surface2: #F3F0FF;
  --text: #1A1033;
  --text-2: #6B5F8A;
  --text-3: #A89EC0;
  --border: #E8E3F5;
  --shadow: 0 2px 16px rgba(124,58,237,0.08);
  --shadow-lg: 0 8px 32px rgba(124,58,237,0.15);
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 72px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}

/* ─── SHELL ─── */
#shell {
  width: 100%;
  max-width: 430px;
  height: 100vh;
  max-height: 900px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 60px rgba(124,58,237,0.18);
  border-radius: 0;
}

/* ─── HEADER ─── */
.app-header {
  padding: 52px 20px 16px;
  background: var(--surface);
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.app-header::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, var(--purple-soft) 0%, transparent 70%);
  border-radius: 50%;
}
.header-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  position: relative;
}
.greeting {
  font-family: 'Sora', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.date-line {
  font-size: 13px;
  color: var(--text-3);
  margin-top: 3px;
  font-weight: 400;
}
.avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--purple-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(124,58,237,0.3);
}

/* Screen header variations */
.screen-header {
  display: flex; align-items: center; justify-content: space-between;
  position: relative;
}
.screen-title {
  font-family: 'Sora', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}
.add-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--purple);
  border: none;
  color: white;
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(124,58,237,0.35);
  transition: transform .15s, box-shadow .15s;
  line-height: 1;
}
.add-btn:active { transform: scale(.93); box-shadow: 0 2px 6px rgba(124,58,237,0.25); }

/* ─── SCROLL AREA ─── */
.app-body {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  padding: 0 16px calc(var(--nav-h) + 12px);
}
.app-body::-webkit-scrollbar { width: 0; }

/* ─── SCREENS ─── */
.screen { display: none; padding-top: 16px; animation: fadeIn .22s ease; }
.screen.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

/* ─── SECTION LABEL ─── */
.section-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-3);
  margin: 20px 0 10px;
}
.section-label:first-child { margin-top: 4px; }

/* ─── CARDS ─── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: transform .18s, box-shadow .18s;
  position: relative;
  overflow: hidden;
}
.card:active { transform: scale(.99); }

/* Vital Card */
.vital-card {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
}
.vital-icon-wrap {
  width: 48px; height: 48px;
  border-radius: 14px;
  background: var(--purple-soft);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.vital-info { min-width: 0; }
.vital-name {
  font-size: 12px;
  color: var(--text-3);
  font-weight: 500;
  margin-bottom: 2px;
}
.vital-val {
  font-family: 'Sora', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
}
.vital-unit { font-size: 12px; color: var(--text-3); font-weight: 400; }
.vital-meta {
  font-size: 11px; color: var(--text-3); margin-top: 2px;
}
.vital-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--green-soft);
  color: var(--green);
  flex-shrink: 0;
}
.vital-actions-row {
  display: flex; gap: 6px; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
}
.vital-action {
  flex: 1;
  padding: 7px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--purple);
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s, color .15s;
}
.vital-action:hover { background: var(--purple-soft); }

/* Med Card */
.med-card { padding: 14px 16px; }
.med-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.med-thumb {
  width: 52px; height: 52px;
  border-radius: 12px;
  background: var(--purple-soft);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  overflow: hidden;
}
.med-thumb img { width:100%; height:100%; object-fit:cover; }
.med-meta { flex: 1; min-width: 0; }
.med-name {
  font-family: 'Sora', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.med-dose {
  font-size: 12px;
  font-weight: 600;
  color: var(--purple);
  margin-top: 1px;
}
.med-btns { display: flex; gap: 5px; flex-shrink: 0; }
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background .15s;
}
.icon-btn:hover { background: var(--purple-soft); }
.icon-btn.taken { background: var(--green-soft); border-color: var(--green); }
.med-pills {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--surface2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  color: var(--text-2);
  font-weight: 500;
}
.pill-warn {
  background: var(--red-soft);
  color: var(--red);
  font-weight: 600;
}

/* Consulta / Agenda Card */
.agenda-card { padding: 14px 16px; }
.agenda-row {
  display: flex; align-items: flex-start; gap: 12px;
}
.agenda-date-block {
  width: 46px; height: 50px;
  border-radius: 12px;
  background: var(--purple-soft);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  flex-shrink: 0;
}
.agenda-day {
  font-family: 'Sora', sans-serif;
  font-size: 20px; font-weight: 800;
  color: var(--purple);
  line-height: 1;
}
.agenda-mon {
  font-size: 10px; font-weight: 600;
  color: var(--purple-light);
  text-transform: uppercase;
  letter-spacing: .04em;
}
.agenda-info { flex: 1; min-width: 0; }
.agenda-title {
  font-family: 'Sora', sans-serif;
  font-size: 14px; font-weight: 700;
  color: var(--text);
}
.agenda-sub {
  font-size: 12px; color: var(--text-3);
  margin-top: 2px; line-height: 1.4;
}
.tag {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 600;
  margin-top: 5px;
}
.tag-blue { background: var(--blue-soft); color: var(--blue); }
.tag-green { background: var(--green-soft); color: var(--green); }
.tag-orange { background: var(--orange-soft); color: var(--orange); }
.tag-purple { background: var(--purple-soft); color: var(--purple); }

/* Exame Card */
.exame-card {
  border-left: 3px solid var(--orange);
}
.exame-done { border-left-color: var(--green); }
.resultado-box {
  margin-top: 10px; padding: 10px 12px;
  background: var(--green-soft);
  border-radius: 10px;
  font-size: 12px; color: #065F46;
  line-height: 1.5;
}

/* ─── HOME SUMMARY CARDS ─── */
.summary-strip {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 4px;
}
.sum-card {
  background: var(--surface);
  border-radius: 14px;
  padding: 14px 10px 12px;
  text-align: center;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.sum-icon { font-size: 22px; margin-bottom: 6px; }
.sum-val {
  font-family: 'Sora', sans-serif;
  font-size: 16px; font-weight: 800;
  color: var(--text);
  line-height: 1;
}
.sum-lbl {
  font-size: 10px; color: var(--text-3); margin-top: 3px;
  font-weight: 500;
}

/* Med adherence bar */
.adh-bar {
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  margin-top: 8px;
  overflow: hidden;
}
.adh-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--purple), var(--purple-light));
  transition: width .6s ease;
}

/* Compartilhamento */
.comp-card {
  background: linear-gradient(135deg, var(--purple-soft) 0%, #EEF2FF 100%);
  border: 1px solid var(--purple-light);
}
.comp-header { display: flex; align-items: center; gap: 10px; }
.comp-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--purple);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.comp-name { font-weight: 700; font-size: 14px; color: var(--text); }
.comp-spec { font-size: 12px; color: var(--text-3); }
.comp-chips {
  display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px;
}
.comp-chip {
  font-size: 10px; font-weight: 600;
  padding: 3px 9px; border-radius: 20px;
  background: white;
  color: var(--purple);
  border: 1px solid var(--purple-light);
}

/* ─── PERFIL ─── */
.profile-hero {
  background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
  border-radius: var(--radius);
  padding: 20px;
  color: white;
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 4px;
}
.profile-big-avatar {
  width: 60px; height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
}
.profile-name {
  font-family: 'Sora', sans-serif;
  font-size: 18px; font-weight: 700;
}
.profile-email { font-size: 12px; opacity: .8; margin-top: 2px; }
.profile-badge {
  display: inline-flex; align-items: center;
  background: rgba(255,255,255,.2);
  border-radius: 20px; padding: 3px 10px;
  font-size: 11px; font-weight: 600;
  margin-top: 6px;
}

.config-row {
  display: flex; align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
}
.config-row:last-child { border-bottom: none; }
.config-icon-wrap {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--purple-soft);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.config-text { flex: 1; }
.config-title { font-size: 14px; font-weight: 600; color: var(--text); }
.config-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.config-chevron { color: var(--text-3); font-size: 16px; }

/* Toggle */
.toggle-wrap { display: flex; align-items: center; }
.toggle {
  width: 44px; height: 26px;
  border-radius: 13px;
  border: none;
  background: var(--border);
  position: relative;
  cursor: pointer;
  transition: background .2s;
}
.toggle.on { background: var(--purple); }
.toggle::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: white;
  top: 3px; left: 3px;
  transition: left .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle.on::after { left: 21px; }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  height: var(--nav-h);
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  padding: 0 8px 8px;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  cursor: pointer;
  border-radius: 12px;
  padding: 8px 4px 4px;
  transition: background .15s;
  color: var(--text-3);
  gap: 3px;
}
.nav-btn.active { color: var(--purple); }
.nav-btn:active { background: var(--purple-soft); }
.nav-icon {
  font-size: 22px;
  transition: transform .15s;
}
.nav-btn.active .nav-icon { transform: scale(1.1); }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: .02em; }
.nav-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--purple);
  display: none;
}
.nav-btn.active .nav-dot { display: block; }

/* ─── MODALS ─── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,16,51,.55);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
  animation: overlayIn .2s ease;
}
.modal-overlay.open { display: flex; }
@keyframes overlayIn { from { opacity:0; } to { opacity:1; } }

.modal-sheet {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-width: 430px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 0 20px 36px;
  animation: sheetUp .25s cubic-bezier(.22,.68,0,1.2);
}
.modal-sheet::-webkit-scrollbar { width:0; }
@keyframes sheetUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-handle {
  width: 36px; height: 4px;
  border-radius: 2px;
  background: var(--border);
  margin: 14px auto 20px;
}
.modal-title {
  font-family: 'Sora', sans-serif;
  font-size: 18px; font-weight: 700;
  color: var(--text);
  margin-bottom: 20px;
}

/* Forms */
.form-group { margin-bottom: 14px; }
.form-label {
  font-size: 12px; font-weight: 600;
  color: var(--text-2);
  display: block; margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: .05em;
}
.form-input, .form-select {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-family: inherit;
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.form-input:focus, .form-select:focus {
  border-color: var(--purple);
  box-shadow: 0 0 0 3px rgba(124,58,237,.12);
}
.form-select { cursor: pointer; }

.btn-row { display: flex; gap: 10px; margin-top: 20px; }
.btn {
  flex: 1; padding: 13px;
  border-radius: 12px;
  border: none;
  font-family: inherit;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}
.btn:active { transform: scale(.98); }
.btn-primary {
  background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(124,58,237,.3);
}
.btn-secondary {
  background: var(--surface2);
  color: var(--text-2);
}
.check-group { display: flex; flex-direction: column; gap: 8px; }
.check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: 10px;
  cursor: pointer;
}
.check-item input { width:16px; height:16px; accent-color: var(--purple); }
.check-item label { font-size: 13px; font-weight: 500; color: var(--text); cursor: pointer; }

/* ─── ALARM MODAL ─── */
.alarm-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,16,51,.8);
  backdrop-filter: blur(8px);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.alarm-overlay.open { display: flex; }
.alarm-box {
  background: var(--surface);
  border-radius: 24px;
  padding: 36px 28px 28px;
  width: 88%;
  max-width: 340px;
  text-align: center;
  animation: bounceIn .35s cubic-bezier(.22,.68,0,1.4);
  box-shadow: var(--shadow-lg);
}
@keyframes bounceIn {
  from { transform: scale(.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.alarm-ring {
  font-size: 64px;
  display: block;
  animation: ring 0.6s ease-in-out infinite;
  margin-bottom: 16px;
}
@keyframes ring {
  0%,100% { transform: rotate(0); }
  25% { transform: rotate(-12deg); }
  75% { transform: rotate(12deg); }
}
.alarm-t { font-family:'Sora',sans-serif; font-size:22px; font-weight:800; color:var(--text); }
.alarm-med { font-size:16px; font-weight:600; color:var(--purple); margin:6px 0 4px; }
.alarm-time { font-size:13px; color:var(--text-3); margin-bottom:24px; }
.alarm-btns { display:flex; gap:10px; }
.alarm-btn {
  flex:1; padding:13px;
  border-radius:12px; border:none;
  font-family:inherit; font-size:14px; font-weight:700;
  cursor:pointer; transition:transform .15s;
}
.alarm-btn:active { transform:scale(.97); }
.alarm-snooze { background:var(--surface2); color:var(--text-2); }
.alarm-take { background:var(--green); color:white; box-shadow:0 4px 12px rgba(16,185,129,.3); }

/* ─── HISTORY MODAL ─── */
.hist-entry {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.hist-entry:last-child { border-bottom: none; }
.hist-status {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.hist-taken { background: var(--green-soft); }
.hist-pending { background: var(--orange-soft); }
.hist-miss { background: var(--red-soft); }
.hist-info { flex:1; }
.hist-date { font-size:13px; font-weight:600; color:var(--text); }
.hist-hour { font-size:11px; color:var(--text-3); }

/* ─── VITAL HISTORY CHART ─── */
.mini-chart {
  display: flex; align-items: flex-end; gap: 4px;
  height: 50px; margin-top: 10px;
}
.bar {
  flex: 1;
  border-radius: 4px 4px 0 0;
  background: var(--purple-soft);
  position: relative;
  min-height: 8px;
  transition: background .15s;
}
.bar.hi { background: var(--purple); }

/* ─── EMPTY STATE ─── */
.empty {
  text-align: center;
  padding: 48px 20px;
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 600; color: var(--text); }
.empty-sub { font-size: 13px; color: var(--text-3); margin-top: 4px; }

.tipo-opt {
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 8px;

// ───── HELPERS ─────
const $ = id => document.getElementById(id);
const mes = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function closeModal(id) {
  $(id).classList.remove('open');
}

function openModal(id) {
  $(id).classList.add('open');
}

function parseDateBR(str) {
  const [d,m,y] = str.split('/');
  return new Date(+y, +m-1, +d);
}

function formatDateBlock(str) {
  const dt = parseDateBR(str);
  return { day: dt.getDate(), mon: mes[dt.getMonth()] };
}

function calcComprimidos(med) {
  const tomados = med.historico.filter(h => h.status === 'tomado').length;
  return Math.max(0, med.estoque - tomados);
}

function jaTomadiHoje(med) {
  const hoje = new Date().toLocaleDateString('pt-BR');
  return med.historico.some(h => h.data === hoje && h.status === 'tomado');
}

// ───── CARD BUILDERS ─────

function vitalCard(v, showActions = true) {
  return `
    <div class="card vital-card" style="padding:14px 16px; display:block;">
      <div style="display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;">
        <div class="vital-icon-wrap">${v.icon}</div>
        <div class="vital-info">
          <div class="vital-name">${v.tipo}</div>
          <div class="vital-val">${v.valor} <span class="vital-unit">${v.unidade}</span></div>
          <div class="vital-meta">Ideal: ${v.ideal} · ${v.fonte}</div>
        </div>
        <div class="vital-badge">Normal</div>
      </div>
      ${showActions ? `
      <div class="vital-actions-row">
        <button class="vital-action" onclick="openAddVital('${v.tipo}')">+ Adicionar</button>
        <button class="vital-action" onclick="openVitalHist('${v.tipo}')">📈 Histórico</button>
      </div>` : ''}
    </div>
  `;
}

function medCard(med) {
  const rest = calcComprimidos(med);
  const tomado = jaTomadiHoje(med);
  const baixo = rest <= med.estoqueMin;
  const pct = med.aderencia;
  const medIcons = { 'Dipirona':'💊','Losartana':'💊','Metformina':'💊','Atorvastatina':'💊','Omeprazol':'💊' };
  return `
    <div class="card med-card">
      <div class="med-top">
        <div class="med-thumb">${medIcons[med.nome]||'💊'}</div>
        <div class="med-meta">
          <div class="med-name">${med.nome}</div>
          <div class="med-dose">${med.dosagem}</div>
        </div>
        <div class="med-btns">
          <button class="icon-btn ${tomado?'taken':''}" onclick="markTaken(${med.id})" title="Já Tomei">✅</button>
          <button class="icon-btn" onclick="openEditMed(${med.id})" title="Editar">✏️</button>
          <button class="icon-btn" onclick="deleteMed(${med.id})" title="Deletar">🗑️</button>
        </div>
      </div>
      <div class="med-pills">
        <span class="pill">🕐 ${med.horario}</span>
        <span class="pill">📅 ${med.frequencia}</span>
        <span class="pill ${baixo?'pill-warn':''}">📦 ${rest}/${med.estoque}</span>
        ${baixo ? '<span class="pill pill-warn">⚠️ Estoque baixo</span>' : ''}
      </div>
      <div class="adh-bar"><div class="adh-fill" style="width:${pct}%"></div></div>
      <div style="font-size:10px;color:var(--text-3);margin-top:4px;text-align:right;">Aderência ${pct}%</div>
    </div>
  `;
}

function consultaCard(c) {
  const db2 = formatDateBlock(c.data);
  const isOnline = c.tipo === 'Online';
  return `
    <div class="card agenda-card">
      <div class="agenda-row">
        <div class="agenda-date-block">
          <div class="agenda-day">${db2.day}</div>
          <div class="agenda-mon">${db2.mon}</div>
        </div>
        <div class="agenda-info">
          <div class="agenda-title">${c.medico}</div>
          <div class="agenda-sub">${c.especialidade} · ${c.hora}</div>
          <div class="agenda-sub">${c.local}</div>
          <div style="margin-top:4px;">
            <span class="tag ${isOnline?'tag-blue':'tag-purple'}">${isOnline?'💻 Online':'🏥 Presencial'}</span>
          </div>
        </div>
      </div>
      ${c.motivo ? `<div style="margin-top:10px;font-size:12px;color:var(--text-3);">📝 ${c.motivo}</div>` : ''}
    </div>
  `;
}

function exameCard(e, done) {
  const db2 = formatDateBlock(e.data);
  return `
    <div class="card agenda-card ${done?'exame-done':'exame-card'}">
      <div class="agenda-row">
        <div class="agenda-date-block" style="background:${done?'var(--green-soft)':'var(--orange-soft)'}">
          <div class="agenda-day" style="color:${done?'var(--green)':'var(--orange)'}">${db2.day}</div>
          <div class="agenda-mon" style="color:${done?'var(--green)':'var(--orange)'}">${db2.mon}</div>
        </div>
        <div class="agenda-info">
          <div class="agenda-title">${e.nome}</div>
          <div class="agenda-sub">${e.local}</div>
          <div style="margin-top:4px;">
            <span class="tag ${done?'tag-green':'tag-orange'}">${done?'✅ Realizado':'⏳ Agendado'}</span>
          </div>
        </div>
      </div>
      ${done && e.resultado ? `<div class="resultado-box">📋 ${e.resultado}</div>` : ''}
      ${!done && e.medico ? `<div style="margin-top:8px;font-size:12px;color:var(--text-3);">Solicitado por ${e.medico}</div>` : ''}
    </div>
  `;
}

function compCard(c) {
  const tipoMap = {
    medico:   { emoji:'👨‍⚕️', cls:'medico',   badge:'tipo-medico',   label:'Médico'   },
    familiar: { emoji:'👨‍👩‍👧', cls:'familiar', badge:'tipo-familiar', label:'Familiar' },
    cuidador: { emoji:'🧑‍🦺', cls:'cuidador', badge:'tipo-cuidador', label:'Cuidador' },
  };
  const t = tipoMap[c.tipo] || tipoMap.medico;
  const statusColor = c.ativo ? 'var(--green)' : 'var(--text-3)';
  const statusText  = c.ativo ? '● Ativo' : '● Pausado';
  return `
    <div class="card comp-card" id="comp-card-${c.id}">
      <div class="comp-header">
        <div class="comp-avatar ${t.cls}">${t.emoji}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <div class="comp-name">${c.nome}</div>
            <span class="tipo-badge ${t.badge}">${t.label}</span>
          </div>
          <div class="comp-spec">${c.subtitulo}</div>
          <div style="font-size:11px;color:${statusColor};font-weight:600;margin-top:2px;">${statusText}</div>
        </div>
      </div>
      <div class="comp-chips">
        ${c.dados.map(d=>`<span class="comp-chip">✓ ${d}</span>`).join('')}
      </div>
      <div class="comp-footer">
        <span class="comp-since">Desde ${c.desde}</span>
        <div class="comp-actions">
          ${c.ativo
            ? `<button class="comp-btn comp-btn-pause"  onclick="pauseComp(${c.id})">⏸ Pausar</button>`
            : `<button class="comp-btn comp-btn-resume" onclick="resumeComp(${c.id})">▶ Reativar</button>`}
          <button class="comp-btn comp-btn-remove" onclick="removeComp(${c.id})">🗑 Remover</button>
        </div>
      </div>
    </div>
  `;
}

// ───── DASHBOARD TOGGLE ─────
function toggleDashCard(id) {
  const card = dashCards.find(c => c.id === id);
  if (!card) return;
  card.ativo = !card.ativo;
  // update visual in perfil
  const wrap = document.getElementById(`dash-toggle-${id}`);
  if (wrap) {
    wrap.classList.toggle('enabled', card.ativo);
    const tog = wrap.querySelector('.toggle');
    if (tog) tog.classList.toggle('on', card.ativo);
  }
  toast(card.ativo ? `✅ "${card.nome}" ativado no Início` : `🚫 "${card.nome}" removido do Início`);
}

// ───── COMP FILTER ─────
function filterComp(tipo, btn) {
  document.querySelectorAll('#compTabs .stab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const lista = tipo === 'todos'
    ? db.compartilhamentos
    : db.compartilhamentos.filter(c => c.tipo === tipo);
  $('compList').innerHTML = lista.length
    ? lista.map(compCard).join('')
    : `<div class="empty"><div class="empty-icon">🔗</div><div class="empty-title">Nenhum compartilhamento nesta categoria</div></div>`;
}

// ───── COMP ACTIONS ─────
function pauseComp(id) {
  const c = db.compartilhamentos.find(x => x.id === id);
  if (!c) return;
  c.ativo = false;
  toast(`⏸ Compartilhamento com ${c.nome} pausado`);
  renderPerfil();
}
function resumeComp(id) {
  const c = db.compartilhamentos.find(x => x.id === id);
  if (!c) return;
  c.ativo = true;
  toast(`▶ Compartilhamento com ${c.nome} reativado`);
  renderPerfil();
}
function removeComp(id) {
  const c = db.compartilhamentos.find(x => x.id === id);
  if (!c || !confirm(`Remover acesso de ${c.nome}?`)) return;
  db.compartilhamentos = db.compartilhamentos.filter(x => x.id !== id);
  toast(`🗑 Acesso de ${c.nome} removido`);
  renderPerfil();
}

// ───── ACTIONS ─────
let currentEditId = null;
let currentVitalType = null;

function markTaken(id) {
  const med = db.medicacoes.find(m => m.id === id);
  if (!med) return;
  const hoje = new Date().toLocaleDateString('pt-BR');
  const hora = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  if (jaTomadiHoje(med)) { toast('Você já marcou este remédio hoje!'); return; }
  med.historico.push({ data: hoje, hora, status: 'tomado' });
  toast(`✅ ${med.nome} marcado como tomado!`);
  renderCurrentScreen();
}

function deleteMed(id) {
  const med = db.medicacoes.find(m => m.id === id);
  if (!med || !confirm(`Deletar ${med.nome}?`)) return;
  db.medicacoes = db.medicacoes.filter(m => m.id !== id);
  toast(`🗑️ ${med.nome} removido`);
  renderCurrentScreen();
}

function openEditMed(id) {
  const med = db.medicacoes.find(m => m.id === id);
  if (!med) return;
  currentEditId = id;
  $('eNome').value = med.nome;
  $('eDose').value = med.dosagem;
  $('eFreq').value = med.frequencia;
  $('eHorario').value = med.horario;
  openModal('editMedModal');
}

function openAddVital(tipo) {
  currentVitalType = tipo;
  $('addVitalTitle').textContent = `+ ${tipo}`;
  $('vValor').value = '';
  openModal('addVitalModal');
}

function openVitalHist(tipo) {
  const v = db.vitais.find(x => x.tipo === tipo);
  if (!v) return;
  $('histTitle').textContent = `📈 ${tipo}`;
  const maxVal = Math.max(...v.historico.map(h => typeof h.val === 'number' ? h.val : parseFloat(h.val)||0));
  const bars = v.historico.map((h, i) => {
    const val = typeof h.val === 'number' ? h.val : parseFloat(h.val)||0;
    const pct = maxVal > 0 ? Math.round((val/maxVal)*100) : 50;
    const isLast = i === v.historico.length - 1;
    return `<div class="bar ${isLast?'hi':''}" style="height:${pct}%" title="${val}"></div>`;
  }).join('');
  $('histContent').innerHTML = `
    <div style="background:var(--surface2);border-radius:12px;padding:14px;">
      <div style="font-size:13px;color:var(--text-3);margin-bottom:6px;">Últimas leituras</div>
      <div class="mini-chart">${bars}</div>
    </div>
    <div style="margin-top:12px;">
      ${v.historico.slice().reverse().slice(0,5).map((h,i) => `
        <div class="hist-entry">
          <div class="hist-status hist-taken">📊</div>
          <div class="hist-info">
            <div class="hist-date">${h.val} ${v.unidade}</div>
            <div class="hist-hour">Fonte: ${v.fonte}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  openModal('vitalHistModal');
}

function toggleAgendaFields() {
  const tipo = $('agTipo').value;
  $('agConsultaFields').style.display = tipo === 'consulta' ? '' : 'none';
  $('agExameFields').style.display = tipo === 'exame' ? '' : 'none';
}

// ───── NAVIGATION ─────
let currentScreen = 'homeScreen';

function renderCurrentScreen() {
  if (currentScreen === 'homeScreen') renderHome();
  else if (currentScreen === 'saudeScreen') renderSaude();
  else if (currentScreen === 'medicacoesScreen') renderMedicacoes();
  else if (currentScreen === 'agendaScreen') renderAgenda();
  else if (currentScreen === 'perfilScreen') renderPerfil();
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const screen = btn.dataset.screen;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(screen).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentScreen = screen;
    renderCurrentScreen();
    // scroll top
    document.querySelector('.app-body').scrollTop = 0;
  });
});

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => {
    if (e.target === o) o.classList.remove('open');
  });
});

// ───── FORMS ─────

// Add Med
$('addMedBtn').addEventListener('click', () => openModal('addMedModal'));
$('cancelAddMed').addEventListener('click', () => closeModal('addMedModal'));
$('addMedForm').addEventListener('submit', e => {
  e.preventDefault();
  const newId = Math.max(...db.medicacoes.map(m=>m.id), 0) + 1;
  db.medicacoes.push({
    id: newId,
    nome: $('inNome').value,
    dosagem: $('inDose').value,
    horario: $('inHorario').value,
    frequencia: $('inFreq').value,
    estoque: parseInt($('inEstoque').value),
    estoqueMin: 7,
    aderencia: 100,
    historico: []
  });
  closeModal('addMedModal');
  $('addMedForm').reset();
  toast('✅ Medicação adicionada!');
  renderCurrentScreen();
});

// Edit Med
$('cancelEditMed').addEventListener('click', () => closeModal('editMedModal'));
$('editMedForm').addEventListener('submit', e => {
  e.preventDefault();
  const med = db.medicacoes.find(m => m.id === currentEditId);
  if (med) {
    med.nome = $('eNome').value;
    med.dosagem = $('eDose').value;
    med.frequencia = $('eFreq').value;
    med.horario = $('eHorario').value;
  }
  closeModal('editMedModal');
  toast('✅ Medicação atualizada!');
  renderCurrentScreen();
});

// Add Agenda
$('addAgendaBtn').addEventListener('click', () => openModal('addAgendaModal'));
$('cancelAddAgenda').addEventListener('click', () => closeModal('addAgendaModal'));
$('addAgendaForm').addEventListener('submit', e => {
  e.preventDefault();
  const tipo = $('agTipo').value;
  const data = $('agData').value;
  const dataBR = data ? new Date(data+'T00:00').toLocaleDateString('pt-BR') : '';
  if (tipo === 'consulta') {
    db.consultas.push({
      id: Date.now(),
      medico: $('agMedico').value,
      especialidade: $('agEspec').value,
      data: dataBR,
      hora: $('agHora').value,
      tipo: $('agAtend').value,
      local: $('agLocal').value,
      motivo: $('agMotivo').value
    });
  } else {
    db.examesAgendados.push({
      id: Date.now(),
      nome: $('agExameNome').value,
      data: dataBR,
      local: $('agLocal').value,
      medico: $('agExameMedico').value
    });
  }
  closeModal('addAgendaModal');
  $('addAgendaForm').reset();
  toggleAgendaFields();
  toast('✅ Agendamento adicionado!');
  renderCurrentScreen();
});

// Add Vital
$('cancelAddVital').addEventListener('click', () => closeModal('addVitalModal'));
$('addVitalForm').addEventListener('submit', e => {
  e.preventDefault();
  const v = db.vitais.find(x => x.tipo === currentVitalType);
  if (v) {
    const novoVal = $('vValor').value;
    v.valor = isNaN(novoVal) ? novoVal : parseFloat(novoVal);
    v.fonte = $('vFonte').value;
    v.dataHora = new Date().toLocaleString('pt-BR');
    v.historico.push({ val: v.valor });
  }
  closeModal('addVitalModal');
  $('addVitalForm').reset();
  toast('✅ Leitura salva!');
  renderCurrentScreen();
});

// Close Hist
$('closeHistModal').addEventListener('click', () => closeModal('vitalHistModal'));

// Compartilhamento
let selectedTipo = 'medico';
function selectTipo(tipo, btn) {
  selectedTipo = tipo;
  document.querySelectorAll('#tipoSelector .tipo-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const labels = { medico:'Especialidade', familiar:'Parentesco / Relação', cuidador:'Tipo de Cuidado' };
  const placeholders = { medico:'Ex: Cardiologia', familiar:'Ex: Esposa, Filho...', cuidador:'Ex: Cuidador Profissional' };
  $('compSubtituloLabel').textContent = labels[tipo];
  $('compSubtitulo').placeholder = placeholders[tipo];
}

$('cancelComp').addEventListener('click', () => closeModal('compModal'));
$('compForm').addEventListener('submit', e => {
  e.preventDefault();
  const checkboxes = document.querySelectorAll('#compForm input[name=compDados]:checked');
  const dados = [...checkboxes].map(c => c.value);
  if (!dados.length) { toast('Selecione ao menos um dado para compartilhar'); return; }
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const agora = new Date();
  db.compartilhamentos.push({
    id: Date.now(),
    tipo: selectedTipo,
    nome: $('compNome').value,
    subtitulo: $('compSubtitulo').value,
    dados,
    ativo: true,
    desde: `${meses[agora.getMonth()]} ${agora.getFullYear()}`
  });
  closeModal('compModal');
  $('compForm').reset();
  selectedTipo = 'medico';
  document.querySelectorAll('#tipoSelector .tipo-opt').forEach((b,i) => b.classList.toggle('active', i===0));
  toast('✅ Compartilhamento criado com sucesso!');
  renderCurrentScreen();
});

// ───── ALARM ─────
let currentAlarmMedId = null;

function showAlarm(medId) {
  const med = db.medicacoes.find(m => m.id === medId);
  if (!med) return;
  currentAlarmMedId = medId;
  $('alarmMedName').textContent = `${med.nome} ${med.dosagem}`;
  $('alarmTime').textContent = med.horario;
  $('alarmOverlay').classList.add('open');
}

$('alarmSnooze').addEventListener('click', () => {
  $('alarmOverlay').classList.remove('open');
  toast('⏰ Lembrete em 10 minutos');
});

$('alarmTake').addEventListener('click', () => {
  if (currentAlarmMedId) markTaken(currentAlarmMedId);
  $('alarmOverlay').classList.remove('open');
});

function checkAlarms() {
  const now = new Date();
  const hm = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  db.medicacoes.forEach(med => {
    if (med.horario === hm && !jaTomadiHoje(med)) showAlarm(med.id);
  });
}
setInterval(checkAlarms, 60000);

// ───── INIT ─────
const today = new Date();
$('dateLine').textContent = today.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
renderHome();
</script>
</body>
